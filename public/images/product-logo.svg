<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F6C453"/>
      <stop offset="100%" stop-color="#D4A72C"/>
    </linearGradient>
  </defs>
  
  <!-- Circular Background -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  
  <!-- Open Quran/Book -->
  <g transform="translate(10, 18)">
    <!-- Left Page -->
    <path d="M0 4C0 1.8 1.8 0 4 0H20V28H4C1.8 28 0 26.2 0 24V4Z" fill="#FFF"/>
    <!-- Right Page -->
    <path d="M44 4C44 1.8 42.2 0 40 0H24V28H40C42.2 28 44 26.2 44 24V4Z" fill="#FFF"/>
    <!-- Spine -->
    <rect x="20" y="-2" width="4" height="32" fill="#E8E4DC" rx="1"/>
  </g>
  
  <!-- Text Lines on Pages -->
  <g stroke="#047857" stroke-width="0.8" opacity="0.4">
    <line x1="14" y1="26" x2="26" y2="26"/>
    <line x1="14" y1="29" x2="26" y2="29"/>
    <line x1="14" y1="32" x2="24" y2="32"/>
    <line x1="38" y1="26" x2="50" y2="26"/>
    <line x1="38" y1="29" x2="50" y2="29"/>
    <line x1="40" y1="32" x2="50" y2="32"/>
  </g>
  
  <!-- Crescent Moon -->
  <path fill="url(#gold)" d="M32 6c-3.3 0-6 2.7-6 6s2.7 6 6 6c-1.7-2.4-3-3-3-6s1.3-3.6 3-6z"/>
  
  <!-- Star -->
  <polygon fill="url(#gold)" points="44,10 45,13 48,13 46,15 47,18 44,16 41,18 42,15 40,13 43,13"/>
</svg>